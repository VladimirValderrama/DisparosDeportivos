  <meta charset="UTF-8">
  <title>Archivo</title>

<style>
        /* Estilos básicos para organizar la visualización */
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .archivo-seccion { margin-bottom: 30px; }
        .archivo-fecha { 
            color: #333; 
            font-size: 1.4rem; 
            border-bottom: 2px solid #eee; 
            padding-bottom: 5px; 
            text-transform: capitalize; 
        }
        .archivo-lista { list-style: none; padding: 0; }
        .archivo-item { margin: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .archivo-item a { text-decoration: none; color: #0066cc; font-weight: bold; font-size: 1.1rem; }
        .archivo-item a:hover { text-decoration: underline; }
        .archivo-meta { color: #666; font-size: 0.9rem; }
    </style>
</head>
<h1>Archivo de Noticias</h1>
    <hr>
    
    <!-- Aquí se cargan las noticias agrupadas -->
    <div id="archivo-contenedor">Cargando archivo...</div>

      <script>
        // 1. Función para interpretar "6 de marzo de 2026" o "06 de marzo de 2026"
        function convertirTextoAFecha(fechaTexto) {
            const mesesMapa = {
                "enero": 0, "febrero": 1, "marzo": 2, "abril": 3, "mayo": 4, "junio": 5,
                "julio": 6, "agosto": 7, "septiembre": 8, "octubre": 9, "noviembre": 10, "diciembre": 11
            };
            
            // Pone todo en minúsculas, quita la palabra " de " y separa por espacios
            const partes = fechaTexto.toLowerCase().replace(/ de /g, ' ').trim().split(/\s+/);
            
            // partes[0] será "6" o "06", parseInt lo convierte en número real automáticamente
            const dia = parseInt(partes[0], 10); 
            const mes = mesesMapa[partes[1]];
            const anio = parseInt(partes[2], 10);
            
            return new Date(anio, mes, dia);
        }

// 2. Cargar las noticias y armar el archivo
        fetch('noticias/articulos.json')
          .then(response => response.json())
          .then(noticias => {
            const contenedor = document.getElementById('archivo-contenedor');
            contenedor.innerHTML = ''; 

            // Ordenamos de más reciente a más antigua
            noticias.sort((a, b) => convertirTextoAFecha(b.fecha) - convertirTextoAFecha(a.fecha));

            // Agrupamos por mes y año
            const noticiasAgrupadas = {};

            noticias.forEach(noticia => {
              const fechaObj = convertirTextoAFecha(noticia.fecha);
              const mesTexto = fechaObj.toLocaleDateString('es-ES', { month: 'long' });
              const anioTexto = fechaObj.getFullYear();
              
              // Título del grupo (Ej: "marzo de 2026")
              const mesAnio = `${mesTexto} de ${anioTexto}`; 
              
              if (!noticiasAgrupadas[mesAnio]) {
                noticiasAgrupadas[mesAnio] = [];
              }
              noticiasAgrupadas[mesAnio].push(noticia);
            });

            // Imprimimos el HTML en la pantalla
            for (const [mesAnio, listaNoticias] of Object.entries(noticiasAgrupadas)) {
              const seccion = document.createElement('div');
              seccion.className = 'archivo-seccion';

              const tituloFecha = document.createElement('h3');
              tituloFecha.className = 'archivo-fecha';
              tituloFecha.innerText = mesAnio;
              seccion.appendChild(tituloFecha);

              const lista = document.createElement('ul');
              lista.className = 'archivo-lista';

              listaNoticias.forEach(noticia => {
                const item = document.createElement('li');
                item.className = 'archivo-item';

                item.innerHTML = `
                  <a href="noticias/articulo.html?id=${noticia.id}">${noticia.titulo}</a>
                  <span class="archivo-meta">${noticia.lugar} - ${noticia.fecha}</span>
                `;
                lista.appendChild(item);
              });

              seccion.appendChild(lista);
              contenedor.appendChild(seccion);
            }
          })
          .catch(error => {
            console.error('Error cargando el archivo:', error);
            document.getElementById('archivo-contenedor').innerHTML = '<h2>Error al cargar el histórico de noticias.</h2>';
          });
    </script>
</body>
